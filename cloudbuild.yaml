steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--build-arg'
      - 'REACT_APP_API_URL=https://bank-backend-justin-524103119199.us-central1.run.app/api/v1'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/gcp-class-14/justin-repo/bank-frontend:$COMMIT_SHA'
      - .

    id: Build Frontend Container Image
  
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'northamerica-northeast1-docker.pkg.dev/gcp-class-14/justin-repo/bank-frontend:$COMMIT_SHA'
    id: Push Frontend Image to Artifact Registry
  
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - bank-frontend
      - '--image'
      - 'northamerica-northeast1-docker.pkg.dev/gcp-class-14/justin-repo/bank-frontend:$COMMIT_SHA'
      - '--region'
      - northamerica-northeast1
      - '--platform'
      - managed
      - '--port'
      - '80'
    id: Deploy Frontend to Cloud Run
timeout: 1200s
images:
  - 'northamerica-northeast1-docker.pkg.dev/gcp-class-14/justin-repo/bank-frontend:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY